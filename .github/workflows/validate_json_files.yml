name: Validate GeoJSON

on:
  pull_request:
    paths:
      - "**/*.geojson"

jobs:
  validate-geojson:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate GeoJSON files
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          import sys
      
          errors = []
      
          for file in Path(".").rglob("*.geojson"):
              try:
                  with file.open("r", encoding="utf-8") as f:
                      json.load(f)
              except json.JSONDecodeError as e:
                  errors.append(
                      f"{file}: JSON error de sintaxis en línea {e.lineno}, columna {e.colno}. {e.msg}"
                  )
              except Exception as e:
                  errors.append(f"{file}: {e}")
      
          if errors:
              print("Algunos ficheros JSON no son válidos:")
              for error in errors:
                  print(f"- {error}")
              sys.exit(1)
      
          print("Todos los ficheros JSON son válidos.")
          PY
